name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: week2-practice-test1
      id: week2-practice-test1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: week2-practice-test1
        setup-command: gcc -o main main.c
        command: "./main"
        input: ''
        expected-output: "[Hh][Ee][Ll][Ll][Oo] [Ww][Oo][Rr][Ll][Dd]"
        comparison-method: regex
        timeout: 1
        max-score: 30
    - name: week2-practice-test2
      id: week2-practice-test2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: week2-practice-test2
        setup-command: gcc -o main main.c
        command: "./main"
        input: ''
        expected-output: |-
          [Hh][Ee][Ll][Ll][Oo]
          [Ww][Oo][Rr][Ll][Dd]
        comparison-method: regex
        timeout: 1
        max-score: 30
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        WEEK2-PRACTICE-TEST1_RESULTS: "${{steps.week2-practice-test1.outputs.result}}"
        WEEK2-PRACTICE-TEST2_RESULTS: "${{steps.week2-practice-test2.outputs.result}}"
      with:
        runners: week2-practice-test1,week2-practice-test2
